  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="icon" href="assets/whalex-logo.png" />
  <link rel="stylesheet" href="assets/slide-style.css" />
</head>
<body class="page-support">


<header class="site-header">
  <nav class="nav container">
    <a href="index.html" class="brand">
      <img src="assets/whalex-logo.png" alt="WhaleX Logo" class="brand-img" />
      <span class="brand-text">WhaleX</span>
    </a>
    <button class="menu-btn" id="menuBtn">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="products.html">Indicators</a>
      <a href="results.html">Reviews & Results</a>
      <a href="videos.html">Videos</a>
      <a href="pricing.html">Buy Access</a>
      <a href="support.html">Support</a>
      <a href="login.html">Login / Create Account</a>
      <a href="user.html">My Access</a>
    </div>
  </nav>
</header>



<main class="client-shell">
  <section class="page-hero client-hero">
    <div class="container">
      <span class="eyebrow">Support</span>
      <h1>Support tickets</h1>
      <p class="hero-subtitle page-subline-hidden" style="display:none"></p>
    </div>
  </section>

  <section class="client-section">
    <div class="container narrow-page">
      <section id="support" class="user-card">
        <h2>Create Support Ticket</h2>
        <form id="supportTicketForm" class="form-grid" enctype="multipart/form-data">
          <label>Name<input name="name" required></label>
          <label>Email<input name="email" type="email" required></label>
          <label>Phone<input name="phone"></label>
          <label>TradingView Username<input name="tradingViewUsername"></label>
          <label>Category<select name="category"><option>Access Issue</option><option>Payment Issue</option><option>Indicator Setup</option><option>TradingView Issue</option><option>Other</option></select></label>
          <label>Priority<select name="priority"><option>normal</option><option>high</option><option>urgent</option></select></label>
          <label style="grid-column:1/-1">Subject<input name="subject" required></label>
          <label style="grid-column:1/-1">Message<textarea name="message" required></textarea></label>
          <label>Attachment<input name="attachment" type="file" accept="image/*,.pdf"></label>
          <button class="btn primary" type="submit">Create Ticket</button>
        </form>
        <div id="supportTicketMsg"></div>
      </section>

      <section id="checkSupport" class="user-card">
        <h2>Check Support Status</h2>
        <form id="checkSupportForm" class="form-grid">
          <label>Ticket ID<input name="ticketId" required placeholder="support-..."></label>
          <label>Email<input name="email" type="email" required></label>
          <button class="btn ghost" type="submit">Check Status</button>
        </form>
        <div id="supportStatusBox"></div>
      </section>
    </div>
  </section>
</main>



<footer class="compact-footer">
  <div class="container compact-footer-inner">
    <span>© WhaleX</span>
    <div>
      <a href="login.html">Login</a>
      <a href="pricing.html">Buy Access</a>
      <a href="support.html">Support</a>

</footer>

</body>
</html>
