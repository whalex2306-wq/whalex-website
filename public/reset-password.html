<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset WhaleX Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/whalex-logo.png" />
  <link rel="stylesheet" href="assets/slide-style.css" />
</head>
<body class="page-login page-login-v42 page-reset-password">

<header class="site-header">
  <nav class="nav container">
    <a href="index.html" class="brand">
      <img src="assets/whalex-logo.png" alt="WhaleX Logo" class="brand-img" />
      <span class="brand-text">WhaleX</span>
    </a>
    <button class="menu-btn" id="menuBtn">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="products.html">Indicators</a>
      <a href="results.html">Reviews & Results</a>
      <a href="videos.html">Videos</a>
      <a href="pricing.html">Buy Access</a>
      <a href="support.html">Support</a>
      <a href="login.html">Login / Create Account</a>
      <a href="user.html">My Access</a>
    </div>
  </nav>
</header>

<main class="client-shell login-clean-page">
  <section class="page-hero client-hero login-clean-hero">
    <div class="container">
      <span class="eyebrow">Password Reset</span>
      <h1>Reset WhaleX password</h1>
    </div>
  </section>

  <section class="client-section login-clean-section">
    <div class="container narrow-page reset-narrow">
      <section class="user-card login-clean-card reset-card">
        <h2>Create new password</h2>

        <form id="resetPasswordForm" class="auth-card forgot-password-card">
          <label>New Password
            <input name="password" type="password" autocomplete="new-password" required minlength="6">
          </label>

          <label>Confirm Password
            <input name="confirmPassword" type="password" autocomplete="new-password" required minlength="6">
          </label>

          <button class="btn primary forgot-submit-btn" type="submit">Reset Password</button>
          <div id="resetMsg"></div>
        </form>

        <div class="hero-actions reset-actions">
          <a class="btn ghost" href="login.html">Back to Login</a>
        </div>
      </section>
    </div>
  </section>
</main>

<footer class="compact-footer">
  <div class="container compact-footer-inner">
    <span>© WhaleX</span>
    <div>
      <a href="login.html">Login</a>
      <a href="pricing.html">Buy Access</a>
      <a href="support.html">Support</a>
      <a href="terms.html">Terms</a>
      <a href="privacy.html">Privacy</a>
    </div>
  </div>
</footer>

<script src="assets/toast.js?v=101"></script>

</body>
</html>
